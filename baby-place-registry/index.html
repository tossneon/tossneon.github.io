<script type="module">
const FIREBASE_CONFIG = null; // TODO: Firebase 콘솔 > 프로젝트 설정 > 내 앱에서 복사한 firebaseConfig 객체를 여기 붙여넣으세요

function stripUndefined(obj){
  const out = {};
  for(const k in obj){ if(obj[k] !== undefined) out[k] = obj[k]; }
  return out;
}

async function initCloudSync(){
  if(!FIREBASE_CONFIG){
    window.cloudSync = { ready:false };
    window.dispatchEvent(new Event("cloudsync-ready"));
    return;
  }
  try {
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js");
    const { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc } =
      await import("https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js");

    const app = initializeApp(FIREBASE_CONFIG);
    const db = getFirestore(app);
    const col = collection(db, "places");

    window.cloudSync = {
      ready: true,
      subscribe(cb){
        return onSnapshot(col, snap => {
          cb(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        }, err => {
          console.error("Firestore sync error", err);
          alert("실시간 동기화 연결에 문제가 생겼어요: " + err.message);
        });
      },
      addPlace(place){
        const { id, ...rest } = place;
        return addDoc(col, stripUndefined(rest));
      },
      updatePlace(id, patch){
        return updateDoc(doc(col, id), stripUndefined(patch));
      },
      deletePlace(id){
        return deleteDoc(doc(col, id));
      }
    };
  } catch(err){
    console.error("Firebase 초기화 실패", err);
    window.cloudSync = { ready:false };
  }
  window.dispatchEvent(new Event("cloudsync-ready"));
}
initCloudSync();
</script>

<script>
const KAKAO_APP_KEY = "391b39ae5de6f3152db3258ae09cd86b";

const TYPES = [
  { key:"놀곳", color:"#3AAFA9", icon:"🎠" },
  { key:"먹을곳", color:"#FF7B54", icon:"🍽️" },
  { key:"카페", color:"#B98B4E", icon:"☕" },
  { key:"기타", color:"#8C8378", icon:"📍" },
];
const TYPE_PRIORITY = ["놀곳", "먹을곳", "카페", "기타"]; // 핀 대표 아이콘 우선순위 — 노는 것 위주
function normalizeTypes(p){
  if(Array.isArray(p.types) && p.types.length) return p.types;
  if(p.type) return [p.type];
  return ["기타"];
}
function primaryType(types){
  return TYPE_PRIORITY.find(k => types.includes(k)) || types[0];
}
const SATISFACTIONS = [
  { key:"최고", emoji:"😍", color:"#3AAFA9" },
  { key:"무난", emoji:"🙂", color:"#B98B4E" },
  { key:"별로", emoji:"😕", color:"#8C8378" },
];
const SEOUL_CITY_HALL = { lat:37.5665, lng:126.9780 };

const STORAGE_KEY = "baby-place-registry:places";
let idSeq = 10;
let places = [
  { id:"1", raw:"https://map.kakao.com/xxxxx", source:"link", name:"몽실놀이터", types:["놀곳"], memo:"실내라 비 와도 좋음, 주차 넉넉", favorite:true, lat:37.5665, lng:126.9780, satisfaction:"최고" },
  { id:"2", raw:"우리동네 국수집", source:"text", name:"우리동네 국수집", types:["먹을곳"], memo:"이유식 데워줌", favorite:false, lat:37.5651, lng:126.9895 },
  { id:"3", raw:"https://place.map.naver.com/yyyyy", source:"link", name:"라운드어바웃 카페", types:["카페","놀곳"], memo:"계곡 옆이라 물놀이도 가능, 유모차 자리 넓음", favorite:false, lat:37.5600, lng:126.9700 },
];
let draft = null;
let rawInput = "";
let filterType = "전체";
let favOnly = false;
let isCloud = false;

let addMode = "search"; // "search" | "manual" — !mapReady일 땐 항상 manual로 폴백
let searchQuery = "";
let searchResults = [];
let searchDone = false;
let searchDebounceTimer = null;
let placesService = null;

function nextIdSeq(){
  return places.reduce((m,p) => {
    const n = Number(p.id);
    return Number.isFinite(n) ? Math.max(m, n) : m;
  }, 0) + 1;
}

function loadLocalState(){
  const saved = localStorage.getItem(STORAGE_KEY);
  if(saved){
    try {
      const parsed = JSON.parse(saved);
      if(Array.isArray(parsed)){
        places = parsed;
        idSeq = nextIdSeq();
      }
    } catch(e){ /* 저장값 손상 시 기본 샘플 유지 */ }
  }
  places = places.map(p => ({...p, types: normalizeTypes(p)}));
}

function persist(){
  if(isCloud) return;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(places));
}

function shareList(){
  const url = `${location.origin}${location.pathname}`;
  const msg = isCloud
    ? "링크가 복사됐어요. 같이 쓸 사람에게 보내주세요 — 그 사람이 등록해도 실시간으로 같이 보여요!"
    : "링크가 복사됐어요. (지금은 기기별로 따로 저장돼서 실시간 공유는 안 돼요)";
  const done = () => alert(msg);
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(done).catch(() => prompt("링크를 복사하세요", url));
  } else {
    prompt("링크를 복사하세요", url);
  }
}

function renderFootnote(){
  const el = document.getElementById("footnote");
  if(!mapReady){
    el.textContent = "지금은 카카오맵 키가 아직 등록되지 않아서 지도와 상호명 검색이 비어있어요. 등록·분류·메모·즐겨찾기·공유는 그대로 사용할 수 있어요.";
  } else if(isCloud){
    el.textContent = "실시간 동기화 중이에요 — 같은 링크로 들어온 사람이 등록하면 바로 같이 보여요. 지도에 핀이 없는 장소는 카드를 탭해서 위치를 지정하세요.";
  } else {
    el.textContent = "지금은 이 기기에만 저장되는 상태예요(실시간 공유 아님). 지도에 핀이 없는 장소는 카드를 탭하면 위치를 지정할 수 있어요.";
  }
}

function renderAll(){ renderFootnote(); renderAdd(); renderFilters(); renderList(); renderMarkers(); }

function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;"); }
function detectSource(raw){ return /^https?:\/\//i.test(raw.trim()) ? "link" : "text"; }
function guessName(raw){
  if(detectSource(raw)==="link"){
    try { const u = new URL(raw.trim()); return u.hostname.replace("www.","") + " 링크"; }
    catch { return "붙여넣은 링크"; }
  }
  return raw.trim();
}

function visiblePlaces(){
  return places.filter(p => filterType==="전체" ? true : (p.types||[]).includes(filterType)).filter(p => favOnly ? p.favorite : true);
}
function hasLoc(p){ return Number.isFinite(p.lat) && Number.isFinite(p.lng); }

/* ---- 등록: 상호명 검색이 기본, 직접입력은 폴백 ---- */
function renderAdd(){
  const el = document.getElementById("addwrap");
  if(draft){ renderDraftForm(el); return; }
  clearDraftPreview();
  if(mapReady && addMode === "search"){ renderSearchBox(el); return; }
  renderManualBox(el);
}

function renderManualBox(el){
  el.innerHTML = `
    <div class="quickadd">
      <input id="raw-input" placeholder="링크, 주소, 상호명 붙여넣기" value="${esc(rawInput)}" />
      <button id="start-btn">＋</button>
    </div>
    ${mapReady ? `<button type="button" class="manuallink" id="to-search-btn">🔍 상호명 검색으로</button>` : ""}`;
  const input = document.getElementById("raw-input");
  input.addEventListener("input", e => { rawInput = e.target.value; document.getElementById("start-btn").classList.toggle("active", rawInput.trim().length>0); });
  input.addEventListener("keydown", e => { if(e.key==="Enter") startRegister(); });
  document.getElementById("start-btn").addEventListener("click", startRegister);
  if(mapReady){
    document.getElementById("to-search-btn").addEventListener("click", () => { addMode = "search"; searchQuery = ""; searchResults = []; searchDone = false; renderAdd(); });
  }
}

function renderSearchBox(el){
  el.innerHTML = `
    <div class="quickadd">
      <input id="search-input" placeholder="상호명으로 검색 (예: OO키즈카페)" value="${esc(searchQuery)}" />
      <button id="search-btn">🔍</button>
    </div>
    <div id="search-results"></div>
    <button type="button" class="manuallink" id="to-manual-btn">✏️ 직접 입력할래요</button>`;
  const input = document.getElementById("search-input");
  input.addEventListener("input", e => { searchQuery = e.target.value; onSearchInput(searchQuery); });
  input.addEventListener("keydown", e => { if(e.key==="Enter"){ e.preventDefault(); clearTimeout(searchDebounceTimer); runSearch(searchQuery.trim()); } });
  document.getElementById("search-btn").addEventListener("click", () => { clearTimeout(searchDebounceTimer); runSearch(searchQuery.trim()); });
  document.getElementById("to-manual-btn").addEventListener("click", () => { addMode = "manual"; renderAdd(); });
  renderSearchResults();
}

function renderSearchResults(){
  const el = document.getElementById("search-results");
  if(!el) return;
  if(searchResults.length){
    el.innerHTML = searchResults.map((r,i) => `
      <div class="searchitem" data-i="${i}">
        <b>${esc(r.place_name)}</b>
        <span>${esc(r.road_address_name || r.address_name || "")}</span>
      </div>`).join("");
    el.querySelectorAll(".searchitem").forEach(item => item.addEventListener("click", () => pickSearchResult(searchResults[Number(item.dataset.i)])));
  } else if(searchDone && searchQuery.trim()){
    el.innerHTML = `<div class="searchempty">검색 결과가 없어요. 직접 입력해보세요.</div>`;
  } else {
    el.innerHTML = "";
  }
}

function onSearchInput(v){
  clearTimeout(searchDebounceTimer);
  searchDone = false;
  if(!v.trim()){ searchResults = []; renderSearchResults(); return; }
  searchDebounceTimer = setTimeout(() => runSearch(v.trim()), 350);
}

function runSearch(query){
  if(!query || !placesService) return;
  const opts = mapReady ? { location: map.getCenter() } : {};
  placesService.keywordSearch(query, (data, status) => {
    searchDone = true;
    searchResults = status === kakao.maps.services.Status.OK ? data.slice(0,6) : [];
    renderSearchResults();
  }, opts);
}

function pickSearchResult(item){
  draft = {
    raw: item.place_name,
    source: "search",
    name: item.place_name,
    address: item.road_address_name || item.address_name || "",
    types: ["놀곳"],
    memo: "",
    lat: parseFloat(item.y),
    lng: parseFloat(item.x)
  };
  searchQuery = ""; searchResults = []; searchDone = false;
  renderAdd();
}

function draftSourceLabel(){
  if(draft.source==="search") return "🔍 검색해서 등록";
  if(draft.source==="link") return "🔗 링크에서 등록";
  return "✏️ 직접 입력";
}

function renderDraftForm(el){
  showDraftPreview();
  el.innerHTML = `
    <div class="draft">
      <div class="draft-top">
        <span class="draft-src">${draftSourceLabel()}</span>
        <button id="cancel-btn">✕</button>
      </div>
      <input class="name" id="draft-name" value="${esc(draft.name)}" placeholder="장소 이름" />
      ${draft.address ? `<div class="draft-addr">${esc(draft.address)}</div>` : ""}
      <label>유형 (여러 개 선택 가능 — 놀면서 먹는 곳이면 둘 다)</label>
      <div class="chiprow" id="type-row"></div>
      <textarea id="draft-memo" rows="2" placeholder="메모 (주차 등)">${esc(draft.memo)}</textarea>
      <button type="button" class="locbtn ${hasLoc(draft) ? 'set' : ''}" id="loc-btn">${hasLoc(draft) ? "📍 위치 수정" : "📍 위치 설정"}</button>
      <button class="save" id="save-btn">등록하기</button>
    </div>`;
  document.getElementById("draft-name").addEventListener("input", e => draft.name = e.target.value);
  document.getElementById("draft-memo").addEventListener("input", e => draft.memo = e.target.value);
  document.getElementById("cancel-btn").addEventListener("click", () => { draft = null; renderAdd(); });
  document.getElementById("save-btn").addEventListener("click", confirmRegister);
  document.getElementById("loc-btn").addEventListener("click", () => {
    openPicker(hasLoc(draft) ? { lat:draft.lat, lng:draft.lng } : null, loc => { draft.lat = loc.lat; draft.lng = loc.lng; renderAdd(); });
  });

  document.getElementById("type-row").innerHTML = TYPES.map(t => `<div class="chip ${draft.types.includes(t.key)?'active':''}" data-t="${t.key}" style="${draft.types.includes(t.key)?`background:${t.color};`:''}">${t.key}</div>`).join("");
  document.querySelectorAll("#type-row .chip").forEach(chip => chip.addEventListener("click", () => {
    const key = chip.dataset.t;
    if(draft.types.includes(key)){
      if(draft.types.length > 1){ draft.types = draft.types.filter(t => t !== key); }
    } else {
      draft.types = [...draft.types, key];
    }
    renderAdd();
  }));
}

function startRegister(){
  const raw = rawInput.trim();
  if(!raw) return;
  const center = mapReady ? currentMapCenter() : null;
  draft = { raw, source: detectSource(raw), name: guessName(raw), types:["놀곳"], memo:"", lat: center ? center.lat : undefined, lng: center ? center.lng : undefined };
  rawInput = "";
  renderAdd();
}
function cloudFail(err){ alert("저장에 실패했어요: " + err.message); }

function confirmRegister(){
  if(!draft || !draft.name.trim()) return;
  const newPlace = { favorite:false, ...draft };
  draft = null;
  renderAdd();
  if(isCloud){
    window.cloudSync.addPlace(newPlace).catch(cloudFail);
  } else {
    places.unshift({ id: String(idSeq++), ...newPlace });
    renderList();
    renderMarkers();
    persist();
  }
}
function toggleFav(id){
  const p = places.find(x => x.id===id);
  if(!p) return;
  if(isCloud){
    window.cloudSync.updatePlace(id, { favorite: !p.favorite }).catch(cloudFail);
  } else {
    places = places.map(x => x.id===id ? {...x, favorite: !x.favorite} : x);
    renderList();
    persist();
  }
}
function setSatisfaction(id, key){
  const p = places.find(x => x.id===id);
  if(!p) return;
  const next = p.satisfaction===key ? null : key;
  if(isCloud){
    window.cloudSync.updatePlace(id, { satisfaction: next }).catch(cloudFail);
  } else {
    places = places.map(x => x.id===id ? {...x, satisfaction: next} : x);
    renderList();
    persist();
  }
}
function removePlace(id){
  if(isCloud){
    window.cloudSync.deletePlace(id).catch(cloudFail);
  } else {
    places = places.filter(p => p.id !== id);
    renderList();
    renderMarkers();
    persist();
  }
}
let pendingDeleteId = null;
let pendingDeleteTimer = null;
function requestDelete(id){
  clearTimeout(pendingDeleteTimer);
  if(pendingDeleteId === id){
    pendingDeleteId = null;
    removePlace(id);
    return;
  }
  pendingDeleteId = id;
  pendingDeleteTimer = setTimeout(() => { pendingDeleteId = null; renderList(); }, 3000);
  renderList();
}
function setLocationFor(id){
  const p = places.find(x => x.id===id);
  openPicker(p && hasLoc(p) ? { lat:p.lat, lng:p.lng } : null, loc => {
    if(isCloud){
      window.cloudSync.updatePlace(id, { lat: loc.lat, lng: loc.lng }).catch(cloudFail);
    } else {
      places = places.map(x => x.id===id ? {...x, lat:loc.lat, lng:loc.lng} : x);
      renderList();
      renderMarkers();
      persist();
    }
  });
}
function onCardClick(id){
  const p = places.find(x => x.id===id);
  if(!p) return;
  if(hasLoc(p)){ focusPlace(id); }
  else { setLocationFor(id); }
}

function renderFilters(){
  const el = document.getElementById("filters");
  const types = ["전체", ...TYPES.map(t=>t.key)];
  el.innerHTML = types.map(t => `<button class="fbtn ${filterType===t?'active':''}" data-t="${t}">${t}</button>`).join("")
    + `<button class="favbtn ${favOnly?'active':''}" id="fav-toggle">⭐</button>`;
  el.querySelectorAll(".fbtn").forEach(b => b.addEventListener("click", () => { filterType = b.dataset.t; renderFilters(); renderList(); renderMarkers(); }));
  document.getElementById("fav-toggle").addEventListener("click", () => { favOnly = !favOnly; renderFilters(); renderList(); renderMarkers(); });
}

function renderList(){
  const el = document.getElementById("list");
  const visible = visiblePlaces();
  if(visible.length===0){ el.innerHTML = `<div class="empty">등록된 장소가 없어요.</div>`; return; }
  el.innerHTML = visible.map(p => {
    const located = hasLoc(p);
    const sourceIcon = p.source==="search" ? "🔍" : p.source==="link" ? "🔗" : "";
    const badges = (p.types||[]).map(tk => {
      const ti = TYPES.find(t=>t.key===tk);
      return `<span class="badge" style="background:${ti?.color}">${esc(tk)}</span>`;
    }).join("");
    return `
      <div class="pcard" data-id="${p.id}" onclick="onCardClick('${p.id}')">
        <div class="pcard-top">
          <div>
            <div class="pcard-meta">
              ${badges}
              ${sourceIcon ? `<span style="font-size:10px;color:#C9BEAE;">${sourceIcon}</span>` : ""}
              ${!located ? `<span class="noloc">📍 위치 미지정 · 탭해서 설정</span>` : ""}
            </div>
            <div class="pname">${esc(p.name)}</div>
            ${p.address ? `<div class="paddr">${esc(p.address)}</div>` : ""}
            ${p.memo ? `<div class="pmemo">${esc(p.memo)}</div>` : ""}
          </div>
          <button class="starbtn" onclick="event.stopPropagation(); toggleFav('${p.id}')">${p.favorite ? "⭐" : "☆"}</button>
        </div>
        <div class="satrow">${SATISFACTIONS.map(s => `<button class="satbtn ${p.satisfaction===s.key?'active':''}" style="${p.satisfaction===s.key?`background:${s.color};color:#fff;border-color:${s.color};`:''}" onclick="event.stopPropagation(); setSatisfaction('${p.id}', '${s.key}')">${s.emoji} ${s.key}</button>`).join("")}</div>
        <div class="delrow"><button class="delbtn ${pendingDeleteId===p.id?'confirm':''}" onclick="event.stopPropagation(); requestDelete('${p.id}')">${pendingDeleteId===p.id ? "정말 삭제할까요? 다시 탭" : "삭제"}</button></div>
      </div>`;
  }).join("");
}

/* ---- 지도 (카카오맵) ---- */
let map = null;
let mapReady = false;
let markerOverlays = [];
let pickerMap = null;
let pickerCallback = null;
let draftPreviewOverlay = null;

function showDraftPreview(){
  if(!mapReady || !draft || !hasLoc(draft)) return;
  clearDraftPreview();
  map.setLevel(4);
  map.setCenter(new kakao.maps.LatLng(draft.lat, draft.lng));
  const el = document.createElement("div");
  el.className = "pin";
  el.style.background = "#3B2E2A";
  el.innerHTML = `<span>📍</span>`;
  draftPreviewOverlay = new kakao.maps.CustomOverlay({
    position: new kakao.maps.LatLng(draft.lat, draft.lng),
    content: el,
    yAnchor: 1
  });
  draftPreviewOverlay.setMap(map);
}
function clearDraftPreview(){
  if(draftPreviewOverlay){ draftPreviewOverlay.setMap(null); draftPreviewOverlay = null; }
}

function defaultCenter(){
  const withLoc = places.find(hasLoc);
  return withLoc ? { lat:withLoc.lat, lng:withLoc.lng } : SEOUL_CITY_HALL;
}
function currentMapCenter(){
  if(!mapReady) return defaultCenter();
  const c = map.getCenter();
  return { lat:c.getLat(), lng:c.getLng() };
}

function initMapOrFallback(){
  if(!KAKAO_APP_KEY){ renderMapPlaceholder(false); return; }
  const script = document.createElement("script");
  script.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${KAKAO_APP_KEY}&autoload=false&libraries=services`;
  script.onload = () => window.kakao.maps.load(initMap);
  script.onerror = () => renderMapPlaceholder(true);
  document.head.appendChild(script);
}
function renderMapPlaceholder(loadError){
  document.getElementById("map").innerHTML = `<div class="map-placeholder">${loadError ? "지도를 불러오지 못했어요." : "지도를 표시하려면 카카오 API 키가 필요해요."}<br><span class="mono">index.html 상단의 KAKAO_APP_KEY</span>에 키를 넣어주세요.</div>`;
}
function initMap(){
  const center = defaultCenter();
  map = new kakao.maps.Map(document.getElementById("map"), { center: new kakao.maps.LatLng(center.lat, center.lng), level: 6 });
  placesService = new kakao.maps.services.Places();
  mapReady = true;
  renderFootnote();
  renderMarkers();
  if(!draft && !rawInput.trim()){ renderAdd(); }
}
function createMarkerEl(place){
  const types = place.types && place.types.length ? place.types : ["기타"];
  const mainKey = primaryType(types);
  const typeInfo = TYPES.find(t => t.key===mainKey) || TYPES[TYPES.length-1];
  const subKey = types.find(t => t !== mainKey);
  const subIcon = subKey ? (TYPES.find(t => t.key===subKey) || {}).icon : "";
  const wrap = document.createElement("div");
  wrap.className = "pin";
  wrap.style.background = typeInfo.color;
  wrap.innerHTML = `<span class="${subIcon ? 'pin-multi' : ''}">${typeInfo.icon}${subIcon}</span>`;
  wrap.title = place.name;
  wrap.addEventListener("click", () => focusPlace(place.id));
  return wrap;
}
function renderMarkers(){
  if(!mapReady) return;
  markerOverlays.forEach(o => o.setMap(null));
  markerOverlays = [];
  const located = visiblePlaces().filter(hasLoc);
  located.forEach(p => {
    const el = createMarkerEl(p);
    const overlay = new kakao.maps.CustomOverlay({
      position: new kakao.maps.LatLng(p.lat, p.lng),
      content: el,
      yAnchor: 1
    });
    overlay.setMap(map);
    markerOverlays.push(overlay);
  });
  fitToMarkers(located);
}
function fitToMarkers(located){
  if(located.length === 0) return;
  if(located.length === 1){
    map.setLevel(4);
    map.setCenter(new kakao.maps.LatLng(located[0].lat, located[0].lng));
    return;
  }
  const bounds = new kakao.maps.LatLngBounds();
  located.forEach(p => bounds.extend(new kakao.maps.LatLng(p.lat, p.lng)));
  map.setBounds(bounds);
}
function focusPlace(id){
  const p = places.find(x => x.id===id);
  if(!p || !hasLoc(p)) return;
  if(mapReady){
    map.setLevel(4);
    map.setCenter(new kakao.maps.LatLng(p.lat, p.lng));
  }
  const card = document.querySelector(`.pcard[data-id="${id}"]`);
  if(card){
    card.scrollIntoView({ behavior:"smooth", block:"center" });
    card.classList.add("highlight");
    setTimeout(() => card.classList.remove("highlight"), 1200);
  }
}

function openPicker(initial, onConfirm){
  if(!mapReady){ alert("아직 지도 키가 등록되지 않아서 위치를 지정할 수 없어요. 카카오 키를 추가하면 사용할 수 있어요."); return; }
  pickerCallback = onConfirm;
  const c = initial && initial.lat!=null ? initial : defaultCenter();
  document.getElementById("picker-overlay").classList.remove("hidden");
  requestAnimationFrame(() => {
    if(!pickerMap){
      pickerMap = new kakao.maps.Map(document.getElementById("picker-map"), { center: new kakao.maps.LatLng(c.lat, c.lng), level: 4 });
    } else {
      pickerMap.relayout();
      pickerMap.setCenter(new kakao.maps.LatLng(c.lat, c.lng));
    }
  });
}
function closePicker(){ document.getElementById("picker-overlay").classList.add("hidden"); }

document.getElementById("picker-cancel").addEventListener("click", closePicker);
document.getElementById("picker-confirm").addEventListener("click", () => {
  if(!pickerMap) return;
  const c = pickerMap.getCenter();
  const loc = { lat:c.getLat(), lng:c.getLng() };
  closePicker();
  if(pickerCallback) pickerCallback(loc);
});
document.getElementById("picker-locate").addEventListener("click", () => {
  if(!navigator.geolocation || !pickerMap) return;
  navigator.geolocation.getCurrentPosition(pos => {
    pickerMap.setCenter(new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude));
  });
});
document.getElementById("locate-btn").addEventListener("click", () => {
  if(!navigator.geolocation || !mapReady) return;
  navigator.geolocation.getCurrentPosition(pos => {
    map.panTo(new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude));
  });
});

function boot(){
  document.getElementById("share-btn").addEventListener("click", shareList);
  if(window.cloudSync && window.cloudSync.ready){
    isCloud = true;
    places = []; // 첫 스냅샷 오기 전까지 하드코딩된 샘플이 잠깐 보이지 않도록
    window.cloudSync.subscribe(newPlaces => {
      places = newPlaces.map(p => ({...p, types: normalizeTypes(p)}));
      renderAll();
    });
  } else {
    isCloud = false;
    loadLocalState();
  }
  renderAll();
  initMapOrFallback();
}
if(window.cloudSync){ boot(); } else { window.addEventListener("cloudsync-ready", boot); }
</script>
