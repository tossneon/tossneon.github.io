<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>배당통장</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700&family=Noto+Sans+KR:wght@400;500;700&family=IBM+Plex+Mono:wght@500;600&display=swap');
  * { box-sizing: border-box; }
  body { margin:0; background:#EDE9DC; font-family:'Noto Sans KR', sans-serif; display:flex; justify-content:center; }
  .serif { font-family:'Noto Serif KR', serif; }
  .mono { font-family:'IBM Plex Mono', monospace; }
  .app { width:100%; max-width:430px; min-height:100vh; background:#F5F1E6; box-shadow:0 0 40px rgba(0,0,0,0.08); }
  .header { position:relative; padding:32px 24px 24px; background:#1F2A44; }
  .header-tag { display:flex; align-items:center; gap:8px; margin-bottom:4px; color:#9C7A3C; font-size:12px; letter-spacing:.1em; }
  .header h1 { color:#F5F1E6; font-size:24px; font-weight:700; margin:0; }
  .header p { color:#8B93A8; font-size:12px; margin:4px 0 0; }
  .perforation { position:absolute; left:0; right:0; bottom:-1px; height:8px; display:flex; }
  .perforation div { flex:1; height:8px; border-radius:0 0 8px 8px; }
  .card { background:#FFFDF8; border:1px solid #E4DCC5; border-radius:16px; padding:16px; }
  .section { padding:0 20px; }
  .mt6 { margin-top:24px; } .mt4{margin-top:16px;} .mt3{margin-top:12px;} .mt2{margin-top:8px;} .mt1{margin-top:4px;}
  .row-between { display:flex; justify-content:space-between; align-items:center; }
  .muted { color:#8B93A8; }
  .ink { color:#1F2A44; }
  .brass { color:#9C7A3C; }
  .red { color:#B23A3A; }
  .big-num { font-size:30px; font-weight:700; }
  .mid-num { font-size:20px; font-weight:700; }
  .badge { font-size:10px; padding:2px 6px; border-radius:4px; background:#EDE9DC; color:#4B5670; font-family:'IBM Plex Mono', monospace; }
  .badge-brass { background:#F0E9D8; color:#9C7A3C; }
  .stamp { border:1.5px solid #9C7A3C; color:#9C7A3C; transform:rotate(-6deg); display:inline-block; font-size:10px; padding:2px 8px; border-radius:2px; font-weight:600; font-family:'IBM Plex Mono', monospace; }
  .progress-track { height:8px; border-radius:999px; background:#EDE9DC; overflow:hidden; margin-top:8px; }
  .progress-fill { height:100%; border-radius:999px; }
  .tabs { display:flex; gap:6px; padding:20px 20px 0; }
  .tab-btn { flex:1; padding:8px; border-radius:8px; font-size:12px; font-weight:500; border:1px solid #E4DCC5; background:#FFFDF8; color:#4B5670; cursor:pointer; }
  .tab-btn.active { background:#1F2A44; color:#F5F1E6; border:none; }
  .content { padding:16px 20px 40px; }
  .holding-card { background:#FFFDF8; border:1px solid #E4DCC5; border-radius:12px; padding:14px; display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
  .stock-name { font-size:14px; font-weight:500; color:#1F2A44; }
  .del-btn { background:none; border:none; cursor:pointer; color:#B23A3A; font-size:16px; }
  .add-btn { width:100%; padding:10px; border-radius:12px; border:none; background:#1F2A44; color:#F5F1E6; font-weight:500; font-size:14px; cursor:pointer; }
  .form-card { background:#FFFDF8; border:1px solid #E4DCC5; border-radius:12px; padding:14px; margin-bottom:10px; }
  .form-input, .form-select { width:100%; font-size:14px; border-radius:8px; padding:8px 10px; border:1px solid #E4DCC5; background:#F5F1E6; color:#1F2A44; margin-top:8px; }
  .acc-btns { display:flex; gap:6px; margin-top:8px; }
  .acc-btn { flex:1; padding:6px; border-radius:8px; font-size:12px; font-weight:500; border:1px solid #E4DCC5; background:#F5F1E6; color:#4B5670; cursor:pointer; }
  .acc-btn.active { background:#1F2A44; color:#F5F1E6; border:none; }
  .submit-btn { width:100%; padding:8px; border-radius:8px; border:none; background:#9C7A3C; color:#FFFDF8; font-weight:500; margin-top:10px; cursor:pointer; }
  .upcoming-card { border-radius:8px; padding:12px; margin-bottom:8px; }
  .upcoming-confirmed { background:#FFFDF8; border:1px solid #E4DCC5; }
  .upcoming-estimated { background:#F5F1E6; border:1px dashed #C9C0A5; }
  .ledger-header { display:flex; justify-content:space-between; font-size:11px; color:#8B93A8; padding:0 4px; margin-bottom:8px; }
  .ledger-table { border:1px solid #E4DCC5; border-radius:12px; overflow:hidden; }
  .ledger-row { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; border-bottom:1px solid #EDE9DC; }
  .footer-note { background:#EDE9DC; color:#4B5670; font-size:11px; line-height:1.6; border-radius:12px; padding:14px; margin:0 20px 32px; }
  select, input { font-family:'Noto Sans KR', sans-serif; }
  .summary-split { border-top:1px dashed #E4DCC5; margin-top:12px; padding-top:12px; }
  .summary-line { display:flex; justify-content:space-between; font-size:11px; margin-top:4px; }
  svg.chart { width:100%; height:70px; display:block; }
</style>
</head>
<body>
<div id="app" class="app"></div>

<script>
/* ----------------------------- 기준일 & 환율 (데모용) ----------------------------- */
const TODAY = new Date("2026-07-09");
const FX_USD_KRW = 1380;

function addMonths(date, n) { const d = new Date(date); d.setMonth(d.getMonth() + n); return d; }
function fmt(d) { return d.toISOString().slice(0, 10); }

function generateDividends({ startDate, freqMonths, baseAmount, annualGrowth, payLagDays, confirmWindowDays }) {
  const events = [];
  let d = new Date(startDate);
  const startYear = d.getFullYear();
  const endBound = addMonths(TODAY, 6);
  let guard = 0;
  while (d <= endBound && guard < 60) {
    const yearsElapsed = d.getFullYear() - startYear;
    const perShare = +(baseAmount * Math.pow(1 + annualGrowth, yearsElapsed)).toFixed(3);
    const payDate = new Date(d);
    payDate.setDate(payDate.getDate() + payLagDays);
    const daysToEx = (d - TODAY) / (1000 * 60 * 60 * 24);
    let status;
    if (d <= TODAY) status = "paid";
    else if (daysToEx <= confirmWindowDays) status = "confirmed";
    else status = "estimated";
    events.push({ exDate: fmt(d), payDate: fmt(payDate), perShare, status });
    d = addMonths(d, freqMonths);
    guard++;
  }
  return events;
}

const STOCKS = [
  { ticker: "005930", name: "삼성전자", market: "KR", currency: "KRW",
    dividends: generateDividends({ startDate: "2023-12-28", freqMonths: 3, baseAmount: 361, annualGrowth: 0.03, payLagDays: 45, confirmWindowDays: 55 }) },
  { ticker: "033780", name: "KT&G", market: "KR", currency: "KRW",
    dividends: generateDividends({ startDate: "2024-03-28", freqMonths: 6, baseAmount: 1500, annualGrowth: 0.02, payLagDays: 50, confirmWindowDays: 80 }) },
  { ticker: "017670", name: "SK텔레콤", market: "KR", currency: "KRW",
    dividends: generateDividends({ startDate: "2024-03-28", freqMonths: 3, baseAmount: 830, annualGrowth: 0.015, payLagDays: 48, confirmWindowDays: 60 }) },
  { ticker: "086790", name: "하나금융지주", market: "KR", currency: "KRW",
    dividends: generateDividends({ startDate: "2024-02-20", freqMonths: 3, baseAmount: 700, annualGrowth: 0.05, payLagDays: 40, confirmWindowDays: 55 }) },
  { ticker: "088980", name: "맥쿼리인프라", market: "KR", currency: "KRW",
    dividends: generateDividends({ startDate: "2024-01-25", freqMonths: 6, baseAmount: 385, annualGrowth: 0.01, payLagDays: 35, confirmWindowDays: 70 }) },
  { ticker: "AAPL", name: "Apple", market: "US", currency: "USD",
    dividends: generateDividends({ startDate: "2024-02-09", freqMonths: 3, baseAmount: 0.24, annualGrowth: 0.04, payLagDays: 14, confirmWindowDays: 40 }) },
  { ticker: "MSFT", name: "Microsoft", market: "US", currency: "USD",
    dividends: generateDividends({ startDate: "2024-02-15", freqMonths: 3, baseAmount: 0.75, annualGrowth: 0.09, payLagDays: 14, confirmWindowDays: 40 }) },
  { ticker: "KO", name: "Coca-Cola", market: "US", currency: "USD",
    dividends: generateDividends({ startDate: "2024-03-15", freqMonths: 3, baseAmount: 0.485, annualGrowth: 0.03, payLagDays: 14, confirmWindowDays: 40 }) },
  { ticker: "O", name: "Realty Income", market: "US", currency: "USD",
    dividends: generateDividends({ startDate: "2024-01-15", freqMonths: 1, baseAmount: 0.256, annualGrowth: 0.02, payLagDays: 12, confirmWindowDays: 35 }) },
  { ticker: "T", name: "AT&T", market: "US", currency: "USD",
    dividends: generateDividends({ startDate: "2024-01-10", freqMonths: 3, baseAmount: 0.2775, annualGrowth: 0.0, payLagDays: 14, confirmWindowDays: 40 }) },
];
const getStock = (ticker) => STOCKS.find((s) => s.ticker === ticker);

const won = (n) => `₩${Math.round(n).toLocaleString("ko-KR")}`;
const monthKey = (dateStr) => dateStr.slice(0, 7);
const thisMonthKey = fmt(TODAY).slice(0, 7);

function grossKRW(event, stock, qty) {
  const gross = event.perShare * qty;
  return stock.currency === "KRW" ? gross : gross * FX_USD_KRW;
}

const ACCOUNT_TYPES = [
  { key: "general", label: "일반위탁", short: "일반" },
  { key: "isa", label: "ISA", short: "ISA" },
  { key: "pension", label: "연금저축·IRP", short: "연금" },
];
const getAccountType = (key) => ACCOUNT_TYPES.find((a) => a.key === key) || ACCOUNT_TYPES[0];

const TAX_NOTE = {
  isa: "만기 시 계좌 손익통산 후 비과세 한도 초과분 9.9% 분리과세",
  pension: "인출 시 연금소득세 3.3~5.5% 또는 기타소득세 16.5% (방식에 따라 다름)",
};
function classifyAmount(event, stock, qty, accountType) {
  const gross = grossKRW(event, stock, qty);
  if (accountType === "general") {
    const rate = stock.currency === "KRW" ? 0.154 : 0.15;
    return { gross, net: gross * (1 - rate), certain: true, taxNote: null };
  }
  return { gross, net: null, certain: false, taxNote: TAX_NOTE[accountType] };
}

/* ----------------------------- 상태 ----------------------------- */
let holdings = [
  { id: 1, ticker: "005930", quantity: 10, purchaseDate: "2024-01-10", accountType: "general" },
  { id: 2, ticker: "O", quantity: 5, purchaseDate: "2023-11-01", accountType: "isa" },
  { id: 3, ticker: "033780", quantity: 20, purchaseDate: "2024-02-01", accountType: "pension" },
];
let tab = "holdings";
let showAdd = false;
let form = { ticker: STOCKS[0].ticker, quantity: "", purchaseDate: "", accountType: "general" };

function setTab(t) { tab = t; render(); }
function toggleAdd() { showAdd = !showAdd; render(); }
function setFormField(key, val) { form[key] = val; }
function setFormAccount(key) { form.accountType = key; render(); }
function addHolding() {
  const qty = Number(document.getElementById("f-qty").value);
  const pdate = document.getElementById("f-date").value;
  const ticker = document.getElementById("f-ticker").value;
  if (!qty || !pdate) return;
  holdings.push({ id: Date.now(), ticker, quantity: qty, purchaseDate: pdate, accountType: form.accountType });
  form = { ticker: STOCKS[0].ticker, quantity: "", purchaseDate: "", accountType: "general" };
  showAdd = false;
  render();
}
function removeHolding(id) { holdings = holdings.filter((h) => h.id !== id); render(); }

/* ----------------------------- 계산 ----------------------------- */
function computeAll() {
  const allEvents = [];
  holdings.forEach((h) => {
    const stock = getStock(h.ticker);
    if (!stock) return;
    stock.dividends.filter((e) => e.exDate >= h.purchaseDate).forEach((e) => {
      const c = classifyAmount(e, stock, h.quantity, h.accountType);
      allEvents.push({ ...e, holdingId: h.id, ticker: h.ticker, name: stock.name, market: stock.market,
        currency: stock.currency, qty: h.quantity, accountType: h.accountType,
        gross: c.gross, net: c.net, certain: c.certain, taxNote: c.taxNote });
    });
  });
  const paidEvents = allEvents.filter((e) => e.status === "paid").sort((a, b) => a.exDate.localeCompare(b.exDate));
  const confirmedEvents = allEvents.filter((e) => e.status === "confirmed").sort((a, b) => a.exDate.localeCompare(b.exDate));
  const estimatedEvents = allEvents.filter((e) => e.status === "estimated").sort((a, b) => a.exDate.localeCompare(b.exDate));
  const thisMonthEvents = [...paidEvents, ...confirmedEvents]
    .filter((e) => monthKey(e.exDate) === thisMonthKey || monthKey(e.payDate) === thisMonthKey)
    .sort((a, b) => a.exDate.localeCompare(b.exDate));

  const yearGross = paidEvents.filter((e) => e.exDate.slice(0, 4) === String(TODAY.getFullYear()) && e.accountType === "general")
    .reduce((s, e) => s + e.gross, 0);
  const generalNetAllTime = paidEvents.filter((e) => e.accountType === "general").reduce((s, e) => s + e.net, 0);
  const isaGrossAllTime = paidEvents.filter((e) => e.accountType === "isa").reduce((s, e) => s + e.gross, 0);
  const pensionGrossAllTime = paidEvents.filter((e) => e.accountType === "pension").reduce((s, e) => s + e.gross, 0);

  const ledgerAsc = [];
  let running = 0;
  paidEvents.forEach((e) => { running += e.gross; ledgerAsc.push({ ...e, running }); });
  const ledgerDesc = [...ledgerAsc].reverse();

  const byMonth = {};
  ledgerAsc.forEach((e) => { byMonth[monthKey(e.exDate)] = e.running; });
  const chartData = Object.entries(byMonth).map(([m, v]) => ({ month: m, value: v }));

  return { paidEvents, confirmedEvents, estimatedEvents, thisMonthEvents, yearGross,
    generalNetAllTime, isaGrossAllTime, pensionGrossAllTime, ledgerDesc, chartData };
}

/* ----------------------------- 미니 차트(SVG) ----------------------------- */
function sparkline(chartData) {
  if (chartData.length < 2) return "";
  const w = 380, h = 70, pad = 4;
  const values = chartData.map((d) => d.value);
  const max = Math.max(...values), min = Math.min(...values, 0);
  const range = max - min || 1;
  const step = (w - pad * 2) / (chartData.length - 1);
  const pts = chartData.map((d, i) => {
    const x = pad + i * step;
    const y = h - pad - ((d.value - min) / range) * (h - pad * 2);
    return `${x},${y}`;
  });
  const areaPts = `${pad},${h - pad} ${pts.join(" ")} ${w - pad},${h - pad}`;
  return `<svg class="chart" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <polygon points="${areaPts}" fill="#1F2A44" opacity="0.12"></polygon>
    <polyline points="${pts.join(" ")}" fill="none" stroke="#1F2A44" stroke-width="1.5"></polyline>
  </svg>`;
}

/* ----------------------------- 렌더 ----------------------------- */
function render() {
  const { paidEvents, confirmedEvents, estimatedEvents, thisMonthEvents, yearGross,
    generalNetAllTime, isaGrossAllTime, pensionGrossAllTime, ledgerDesc, chartData } = computeAll();

  const THRESHOLD = 20000000;
  const pct = Math.min(100, (yearGross / THRESHOLD) * 100);

  const stockOptions = STOCKS.map((s) =>
    `<option value="${s.ticker}" ${form.ticker === s.ticker ? "selected" : ""}>${s.name} (${s.market === "KR" ? "국내" : "해외"} · ${s.ticker})</option>`
  ).join("");

  const thisMonthHtml = thisMonthEvents.length === 0
    ? `<p class="muted" style="font-size:14px;">이번 달 확정된 배당이 아직 없어요.</p>`
    : `
      <div class="big-num serif mono ink">${won(thisMonthEvents.reduce((s, e) => s + e.gross, 0))}</div>
      <div class="muted mt1" style="font-size:10px;">세전 합계 (계좌별 실수령은 아래 참고)</div>
      <div class="mt3">
        ${thisMonthEvents.map((e) => `
          <div style="font-size:12px; margin-bottom:8px;">
            <div class="row-between">
              <span class="muted">${e.name} · ${e.exDate.slice(5)} 배당락 <span class="mono" style="color:#8B93A8;">[${getAccountType(e.accountType).short}]</span></span>
              <span class="mono ink" style="font-weight:500;">${won(e.gross)}</span>
            </div>
            <div style="text-align:right; font-size:10px;">
              ${e.certain ? `<span class="mono brass">세후 확정 ${won(e.net)}</span>` : `<span class="muted">${e.taxNote}</span>`}
            </div>
          </div>`).join("")}
      </div>`;

  const chartHtml = chartData.length > 1 ? `<div class="mt3">${sparkline(chartData)}</div>` : "";

  const holdingsHtml = holdings.map((h) => {
    const stock = getStock(h.ticker);
    if (!stock) return "";
    const acc = getAccountType(h.accountType);
    const events = paidEvents.filter((e) => e.holdingId === h.id);
    const totalGross = events.reduce((s, e) => s + e.gross, 0);
    const totalNet = events.reduce((s, e) => s + (e.net || 0), 0);
    return `
      <div class="holding-card">
        <div>
          <div style="display:flex; align-items:center; gap:6px; flex-wrap:wrap;">
            <span class="stock-name">${stock.name}</span>
            <span class="badge">${stock.market === "KR" ? "국내" : "해외"}</span>
            <span class="badge ${h.accountType !== "general" ? "badge-brass" : ""}">${acc.label}</span>
          </div>
          <div class="muted mt1" style="font-size:11px;">${h.quantity}주 · ${h.purchaseDate} 매입</div>
          <div class="mono ink mt1" style="font-size:11px;">누적 세전 ${won(totalGross)}</div>
          ${h.accountType === "general"
            ? `<div class="mono brass" style="font-size:11px;">세후 확정 ${won(totalNet)}</div>`
            : `<div class="muted" style="font-size:10px;">${TAX_NOTE[h.accountType]}</div>`}
        </div>
        <button class="del-btn" onclick="removeHolding(${h.id})">✕</button>
      </div>`;
  }).join("");

  const addFormHtml = !showAdd
    ? `<button class="add-btn" onclick="toggleAdd()">+ 종목 추가</button>`
    : `
      <div class="form-card">
        <div class="row-between">
          <span class="muted" style="font-size:12px; font-weight:500;">새 종목 추가</span>
          <button class="del-btn" style="color:#8B93A8;" onclick="toggleAdd()">✕</button>
        </div>
        <select id="f-ticker" class="form-select mono">${stockOptions}</select>
        <input id="f-qty" class="form-input" type="number" placeholder="보유 수량" />
        <input id="f-date" class="form-input" type="date" />
        <div class="acc-btns">
          ${ACCOUNT_TYPES.map((a) => `<button class="acc-btn ${form.accountType === a.key ? "active" : ""}" onclick="setFormAccount('${a.key}')">${a.short}</button>`).join("")}
        </div>
        <button class="submit-btn" onclick="addHolding()">추가하기</button>
      </div>`;

  const confirmedHtml = confirmedEvents.length === 0
    ? `<p class="muted" style="font-size:12px;">확정된 예정 배당이 없어요.</p>`
    : confirmedEvents.map((e) => `
      <div class="upcoming-card upcoming-confirmed">
        <div class="row-between">
          <div>
            <div class="ink" style="font-size:14px;">${e.name} <span class="mono muted" style="font-size:10px;">${getAccountType(e.accountType).short}</span></div>
            <div class="muted" style="font-size:11px;">배당락 ${e.exDate} · 지급 ${e.payDate}</div>
          </div>
          <span class="mono ink" style="font-size:14px; font-weight:500;">${won(e.gross)}</span>
        </div>
        <div style="text-align:right; font-size:10px; margin-top:2px;">
          ${e.certain ? `<span class="mono brass">세후 확정 ${won(e.net)}</span>` : `<span class="muted">${e.taxNote}</span>`}
        </div>
      </div>`).join("");

  const estimatedHtml = estimatedEvents.slice(0, 6).map((e) => `
    <div class="upcoming-card upcoming-estimated">
      <div class="row-between">
        <div>
          <div class="muted" style="font-size:14px;">${e.name} <span class="mono" style="font-size:10px;">${getAccountType(e.accountType).short}</span></div>
          <div class="muted" style="font-size:11px;">배당락 예상 ${e.exDate}</div>
        </div>
        <span class="mono muted" style="font-size:14px;">약 ${won(e.gross)} (세전)</span>
      </div>
    </div>`).join("");

  const ledgerHtml = ledgerDesc.length === 0
    ? `<div class="ledger-table"><div style="padding:16px; text-align:center; font-size:12px; color:#8B93A8;">아직 지급된 배당 기록이 없어요.</div></div>`
    : `<div class="ledger-table">${ledgerDesc.map((e, i) => `
        <div class="ledger-row" style="background:${i % 2 === 0 ? "#FFFDF8" : "#F9F6EE"};">
          <div>
            <div class="mono muted" style="font-size:12px;">${e.exDate}</div>
            <div class="ink" style="font-size:14px;">${e.name} <span class="mono muted" style="font-size:10px;">${getAccountType(e.accountType).short}</span></div>
            ${e.certain ? `<div class="mono brass" style="font-size:10px;">세후 ${won(e.net)}</div>` : `<div class="muted" style="font-size:10px;">${e.taxNote}</div>`}
          </div>
          <div style="text-align:right;">
            <div class="mono ink" style="font-size:14px; font-weight:500;">+${won(e.gross)}</div>
            <div class="mono muted" style="font-size:10px;">${won(e.running)}</div>
          </div>
        </div>`).join("")}</div>`;

  const app = document.getElementById("app");
  app.innerHTML = `
    <div class="header">
      <div class="header-tag">💼 DIVIDEND PASSBOOK</div>
      <h1 class="serif">배당통장</h1>
      <p>이경환님의 배당 기록 · 국내·해외 통합</p>
      <div class="perforation">${Array.from({ length: 30 }).map((_, i) => `<div style="background:${i % 2 === 0 ? "#1F2A44" : "transparent"};"></div>`).join("")}</div>
    </div>

    <div class="section mt6">
      <div class="card">
        <div class="row-between">
          <span class="muted" style="font-size:12px; font-weight:500;">이번 달 확정 배당</span>
          ${thisMonthEvents.length > 0 ? `<span class="stamp">확정</span>` : ""}
        </div>
        <div class="mt2">${thisMonthHtml}</div>
      </div>
    </div>

    <div class="section mt4">
      <div class="card">
        <div class="row-between" style="align-items:baseline;">
          <span class="muted" style="font-size:12px;">${TODAY.getFullYear()}년 누적 배당소득 (세전)</span>
          <span class="mono muted" style="font-size:11px;">기준 2,000만원</span>
        </div>
        <div class="mid-num serif mono ink mt1">${won(yearGross)}</div>
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%; background:${pct > 80 ? "#B23A3A" : "#9C7A3C"};"></div></div>
        ${pct > 70 ? `<p class="red mt1" style="font-size:11px;">종합과세 기준(2천만원)에 가까워지고 있어요. 정확한 세액은 세무사 확인을 권장해요.</p>` : ""}
        <div class="summary-split">
          <div class="summary-line"><span class="muted">일반위탁 누적 (세후 확정)</span><span class="mono ink" style="font-weight:500;">${won(generalNetAllTime)}</span></div>
          <div class="summary-line"><span class="muted">ISA 누적 (세전, 만기 정산 예정)</span><span class="mono brass" style="font-weight:500;">${won(isaGrossAllTime)}</span></div>
          <div class="summary-line"><span class="muted">연금계좌 누적 (세전, 인출 시 정산 예정)</span><span class="mono brass" style="font-weight:500;">${won(pensionGrossAllTime)}</span></div>
        </div>
        ${chartHtml}
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn ${tab === "holdings" ? "active" : ""}" onclick="setTab('holdings')">보유종목</button>
      <button class="tab-btn ${tab === "upcoming" ? "active" : ""}" onclick="setTab('upcoming')">예정배당</button>
      <button class="tab-btn ${tab === "ledger" ? "active" : ""}" onclick="setTab('ledger')">지난기록</button>
    </div>

    <div class="content">
      ${tab === "holdings" ? `${addFormHtml}<div class="mt3">${holdingsHtml}</div>` : ""}
      ${tab === "upcoming" ? `
        <div>
          <div style="display:flex; align-items:center; gap:6px; margin-bottom:8px;">
            <span class="stamp">확정</span><span class="muted" style="font-size:12px;">이사회 결의 등으로 금액·일정이 정해진 배당</span>
          </div>
          ${confirmedHtml}
        </div>
        <div class="mt4">
          <div style="display:flex; align-items:center; gap:6px; margin-bottom:8px;">
            <span style="font-size:10px; padding:2px 8px; border:1.5px solid #8B93A8; color:#8B93A8; border-radius:2px; font-weight:600; font-family:'IBM Plex Mono',monospace;">예상</span>
            <span class="muted" style="font-size:12px;">과거 지급 패턴 기반 추정치</span>
          </div>
          ${estimatedHtml}
        </div>` : ""}
      ${tab === "ledger" ? `
        <div class="ledger-header"><span>거래일 / 종목·계좌</span><span>세전 수령액 / 누적</span></div>
        ${ledgerHtml}
        <div class="card mt3">
          <div class="summary-line"><span class="muted">일반위탁 누적 (세후 확정)</span><span class="mono ink" style="font-weight:500;">${won(generalNetAllTime)}</span></div>
          <div class="summary-line"><span class="muted">ISA 누적 (세전, 만기 정산 예정)</span><span class="mono brass" style="font-weight:500;">${won(isaGrossAllTime)}</span></div>
          <div class="summary-line"><span class="muted">연금계좌 누적 (세전, 인출 시 정산 예정)</span><span class="mono brass" style="font-weight:500;">${won(pensionGrossAllTime)}</span></div>
        </div>` : ""}
    </div>

    <div class="footer-note">
      지금은 프로토타입 단계라 예시 종목·배당 데이터로 계산돼요. 실제 서비스에서는 증권사 계좌 연동과 실시간 시세로 자동 반영되고, 배당금·환율은 지급 시점에 따라 달라질 수 있어요. 모든 금액은 계좌와 무관하게 비교 가능하도록 세전 기준으로 표시하고, 세율이 고정된 일반위탁만 세후 확정 금액을 추가로 병기해요. ISA·연금저축·IRP는 최종 세액이 만기·인출 시점에 결정되므로 임의로 순액을 계산하지 않고 예상 세율 구간만 안내해요. 종합과세 여부는 다른 소득과 합산해 정확히 확인해 주세요.
    </div>
  `;
}

render();
</script>
</body>
</html>
