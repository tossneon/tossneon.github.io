<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ted Lee — Maker's Journal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700;900&family=IBM+Plex+Mono:wght@500;600&display=swap');
  * { box-sizing: border-box; }
  body { margin:0; background:#DCDCE0; font-family:'Noto Sans KR', sans-serif; display:flex; justify-content:center; }
  .display { font-family:'Black Han Sans', sans-serif; }
  .mono { font-family:'IBM Plex Mono', monospace; }
  .app { width:100%; max-width:480px; background:#F5F5F7; box-shadow:0 0 60px rgba(0,0,0,0.08); min-height:100vh; }

  .hero { position:relative; overflow:hidden; background:#0E0F13; }
  .hero-bignum { position:absolute; top:-40px; right:-40px; font-size:260px; color:rgba(255,255,255,0.03); line-height:1; user-select:none; pointer-events:none; }
  .hero-inner { position:relative; padding:56px 24px 48px; }
  .hero-tag { font-size:11px; letter-spacing:.25em; color:#4C6FFF; margin:0; }
  .hero h1 { font-size:46px; line-height:1.15; color:#F5F5F7; margin:16px 0 0; }
  .mark { background-image:linear-gradient(120deg,#4C6FFF 0%,#4C6FFF 100%); background-repeat:no-repeat; background-size:100% 42%; background-position:0 88%; padding:0 2px; color:#F5F5F7; }
  .hero p.desc { margin-top:20px; font-size:14px; line-height:1.7; color:#9A9CA5; max-width:320px; }
  .stats { display:flex; gap:24px; margin-top:32px; font-family:'IBM Plex Mono',monospace; font-size:11px; color:#63656F; }
  .stats .num { color:#F5F5F7; font-size:20px; font-weight:700; }

  .section-label { padding:0 20px; margin-top:36px; font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.15em; color:#A2A3AB; }
  .section-label:first-of-type { margin-top:32px; }

  .projects { padding:12px 20px 0; display:flex; flex-direction:column; gap:20px; }
  .card { position:relative; border-radius:16px; padding:24px 20px; background:#FFFFFF; border:1px solid #E4E4E9; box-shadow:0 4px 14px rgba(14,15,19,0.05); transition:box-shadow .2s ease, transform .2s ease; text-decoration:none; display:block; }
  .card:hover { transform:translateY(-3px); box-shadow:0 14px 28px rgba(14,15,19,0.10); }
  .card-bignum { position:absolute; top:4px; right:12px; font-size:92px; color:#EFEFF3; line-height:1; user-select:none; pointer-events:none; }
  .card-meta { display:flex; align-items:center; gap:8px; position:relative; }
  .card-date { font-family:'IBM Plex Mono',monospace; font-size:10px; color:#A2A3AB; }
  .badge { font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:600; padding:2px 8px; border-radius:4px; color:#fff; }
  .card h2 { font-size:26px; margin:8px 0 0; color:#14151A; position:relative; }
  .card p.d { font-size:14px; line-height:1.6; color:#61636C; max-width:280px; margin-top:8px; position:relative; }
  .card p.note { font-size:12px; line-height:1.6; color:#A2A3AB; max-width:280px; margin-top:8px; position:relative; }
  .tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:12px; position:relative; }
  .tag { font-family:'IBM Plex Mono',monospace; font-size:10px; padding:4px 8px; border-radius:6px; background:#F0F0F4; color:#7C7E88; display:inline-flex; align-items:center; gap:4px; }
  .card .btn { display:inline-flex; align-items:center; gap:4px; margin-top:16px; font-size:12px; font-weight:700; padding:8px 14px; border-radius:999px; background:#14151A; color:#F5F5F7; position:relative; }

  .history-wrap { padding:0 20px; }
  .history { border-radius:16px; border:1px solid #E4E4E9; background:#EFEFF1; }
  .history summary { cursor:pointer; padding:16px 20px; font-size:13px; color:#7C7E88; list-style:none; display:flex; align-items:center; justify-content:space-between; }
  .history summary::-webkit-details-marker { display:none; }
  .history-items { padding:0 16px 16px; display:flex; flex-direction:column; gap:10px; }
  .history-card { border-radius:12px; padding:14px 16px; background:#FFFFFF; border:1px solid #E4E4E9; opacity:0.7; }
  .history-card h3 { font-size:16px; margin:0; color:#54565F; }
  .history-card p { font-size:12px; color:#9A9CA5; margin:4px 0 0; }
  .empty-hint { padding:16px 20px; font-size:12px; color:#B7B8C0; }

  .memo-wrap { padding:36px 20px 40px; }
  .memo-card { border-radius:16px; overflow:hidden; border:1px solid #E4E4E9; background:#FFFFFF; }
  .memo-head { padding:20px 20px 12px; }
  .memo-head-row { display:flex; align-items:center; justify-content:space-between; }
  .memo-head h3 { font-size:20px; margin:0; color:#14151A; }
  .memo-count { font-family:'IBM Plex Mono',monospace; font-size:11px; color:#A2A3AB; }
  .memo-sub { font-size:12px; color:#A2A3AB; margin:4px 0 0; }
  .memo-list { padding:0 12px 12px; display:flex; flex-direction:column; gap:6px; max-height:288px; overflow-y:auto; }
  .memo-item { display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-radius:12px; background:#F7F7F9; }
  .memo-item span { font-size:14px; color:#2A2B31; }
  .memo-item button { background:none; border:none; cursor:pointer; color:#B7B8C0; font-size:13px; }
  .memo-input-row { padding:4px 12px 12px; }
  .memo-input-wrap { display:flex; align-items:center; gap:8px; border-radius:999px; padding:6px 6px 6px 16px; background:#F7F7F9; border:1px solid #ECECF0; }
  .memo-input-wrap input { flex:1; border:none; outline:none; font-size:14px; padding:8px 0; color:#14151A; background:transparent; font-family:'Noto Sans KR',sans-serif; }
  .memo-send { width:36px; height:36px; border-radius:999px; border:none; display:flex; align-items:center; justify-content:center; background:#DADBE0; color:#fff; cursor:pointer; flex-shrink:0; }
  .memo-send.active { background:#4C6FFF; }

  .footer { padding:32px 24px; background:#0E0F13; }
  .footer .display { font-size:20px; color:#F5F5F7; margin:0; }
  .footer p.c { font-family:'IBM Plex Mono',monospace; font-size:10px; color:#63656F; margin-top:8px; }
</style>
</head>
<body>
<div class="app">
  <div class="hero">
    <div class="hero-bignum display" id="hero-bignum">003</div>
    <div class="hero-inner">
      <p class="hero-tag mono">MAKER'S JOURNAL · SIDE PROJECT LOG</p>
      <h1 class="display"><span class="mark">Ted Lee</span></h1>
      <p class="desc">틈틈이 쌓아온 것들. 아이디어부터 프로토타입, 그리고 언젠가 실제로 쓰이는 것까지 — 여기 전부 기록됩니다.</p>
      <div class="stats" id="hero-stats"></div>
    </div>
  </div>

  <div class="section-label mono" id="active-label">진행중</div>
  <div class="projects" id="active-projects"></div>

  <div class="section-label mono">히스토리</div>
  <div class="history-wrap">
    <details class="history">
      <summary><span>써봤지만 계속 안 하기로 한 것들</span><span id="history-count" class="mono">0개</span></summary>
      <div class="history-items" id="history-projects"></div>
    </details>
  </div>

  <div class="memo-wrap">
    <div class="memo-card">
      <div class="memo-head">
        <div class="memo-head-row">
          <h3 class="display">아이디어 메모</h3>
          <span class="memo-count mono" id="idea-count">0개</span>
        </div>
        <p class="memo-sub">다음에 만들지도 모르는 것들, 일단 여기 던져둠</p>
      </div>
      <div class="memo-list" id="idea-list"></div>
      <div class="memo-input-row">
        <div class="memo-input-wrap">
          <input id="idea-input" placeholder="새 아이디어 던지기" />
          <button class="memo-send" id="idea-send">➤</button>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <p class="display">계속 만드는 중.</p>
    <p class="c">© 2026 Ted Lee · 문의는 카카오톡으로</p>
  </div>
</div>

<script src="./registry.js"></script>
<script>
const STATUS_MAP = Object.fromEntries(REGISTRY.statuses.map(s => [s.key, s]));
const ORDER = REGISTRY.statuses.filter(s => s.group === "active").map(s => s.key);

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;"); }

function projectHref(p){
  return encodeURI("./" + p.folder + "/" + p.file);
}

function renderProjects(){
  const active = REGISTRY.projects
    .filter(p => STATUS_MAP[p.status]?.group !== "history")
    .sort((a, b) => ORDER.indexOf(a.status) - ORDER.indexOf(b.status));
  const history = REGISTRY.projects.filter(p => STATUS_MAP[p.status]?.group === "history");

  document.getElementById("active-projects").innerHTML = active.map((p, i) => {
    const st = STATUS_MAP[p.status] || { label: p.status, color: "#6B7280" };
    return `
    <a class="card" href="${projectHref(p)}">
      <div class="card-bignum display">${String(i + 1).padStart(2, "0")}</div>
      <div class="card-meta">
        <span class="card-date mono">${esc(p.date)}</span>
        <span class="badge" style="background:${st.color};">${esc(st.label)}</span>
      </div>
      <h2 class="display">${esc(p.title)}</h2>
      <p class="d">${esc(p.description)}</p>
      ${p.note ? `<p class="note">💭 ${esc(p.note)}</p>` : ""}
      <div class="tags">${p.tags.map(t => `<span class="tag">🏷 ${esc(t)}</span>`).join("")}</div>
      <span class="btn">둘러보기 ↗</span>
    </a>`;
  }).join("");

  document.getElementById("history-count").textContent = history.length + "개";
  document.getElementById("history-projects").innerHTML = history.length
    ? history.map(p => `
      <a class="history-card" style="display:block;text-decoration:none;" href="${projectHref(p)}">
        <h3>${esc(p.title)}</h3>
        <p>${esc(p.date)} · ${esc(p.description)}</p>
      </a>`).join("")
    : `<p class="empty-hint">아직 없음. 접기로 한 프로젝트가 생기면 여기 쌓여요.</p>`;

  document.getElementById("hero-stats").innerHTML = `
    <div><div class="num">${String(REGISTRY.projects.length).padStart(2,"0")}</div>PROJECTS</div>
    <div><div class="num" id="stat-ideas">00</div>IDEAS</div>
    <div><div class="num">'26</div>SINCE</div>`;
  document.getElementById("hero-bignum").textContent = String(REGISTRY.projects.length).padStart(3, "0");
}

/* 아이디어 메모: registry.js의 ideas[]를 최초 시드로 쓰고, 이후엔 이 기기의 localStorage가 기준이 된다. */
const IDEA_KEY = "maker_journal_ideas_v1";
let ideas = loadIdeas();

function loadIdeas(){
  try {
    const raw = localStorage.getItem(IDEA_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) { console.error("아이디어 불러오기 실패", e); }
  return REGISTRY.ideas.map((t, i) => ({ id: i, text: t }));
}
function saveIdeas(){
  try { localStorage.setItem(IDEA_KEY, JSON.stringify(ideas)); }
  catch (e) { console.error("아이디어 저장 실패", e); }
}
function renderIdeas(){
  const list = document.getElementById("idea-list");
  document.getElementById("idea-count").textContent = ideas.length + "개";
  const statEl = document.getElementById("stat-ideas");
  if (statEl) statEl.textContent = String(ideas.length).padStart(2, "0");
  list.innerHTML = ideas.map(i => `
    <div class="memo-item">
      <span>${esc(i.text)}</span>
      <button onclick="removeIdea(${i.id})">✕</button>
    </div>`).join("");
}
function removeIdea(id){ ideas = ideas.filter(i => i.id !== id); saveIdeas(); renderIdeas(); }
function addIdea(){
  const el = document.getElementById("idea-input");
  const t = el.value.trim();
  if (!t) return;
  ideas.unshift({ id: Date.now(), text: t });
  el.value = "";
  saveIdeas();
  renderIdeas();
  updateSendBtn();
}
function updateSendBtn(){
  const el = document.getElementById("idea-input");
  document.getElementById("idea-send").classList.toggle("active", el.value.trim().length > 0);
}
document.getElementById("idea-send").addEventListener("click", addIdea);
document.getElementById("idea-input").addEventListener("keydown", e => { if (e.key === "Enter") addIdea(); });
document.getElementById("idea-input").addEventListener("input", updateSendBtn);

renderProjects();
renderIdeas();
</script>
</body>
</html>
