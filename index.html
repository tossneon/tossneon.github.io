<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>체크노트</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Sans+KR:wght@400;500;700&display=swap');
  * { box-sizing: border-box; }
  html, body { height:100%; margin:0; }
  body { background:#EDEDE6; font-family:'Noto Sans KR', sans-serif; display:flex; justify-content:center; overflow:hidden; }
  .display { font-family:'Gowun Dodum', sans-serif; }
  .app { width:100%; max-width:420px; height:100vh; height:100dvh; background:#FAF9F5; box-shadow:0 0 40px rgba(0,0,0,0.06); display:flex; flex-direction:column; overflow:hidden; }
  .header { padding:12px 20px 10px; flex-shrink:0; }
  .header h1 { font-size:20px; margin:0; color:#2B2E35; }
  .header p { font-size:12px; margin:2px 0 0; color:#9A998F; }
  .content { flex:1; min-height:0; overflow-y:auto; padding:0 20px 16px; -webkit-overflow-scrolling:touch; }
  .empty { text-align:center; padding:60px 0; color:#B7B6AB; }
  .empty .t1 { font-size:14px; } .empty .t2{ font-size:12px; margin-top:4px; }
  .item-card { display:flex; align-items:flex-start; gap:12px; border-radius:16px; padding:12px 16px; background:#fff; border:1px solid #EBE9E0; margin-bottom:8px; }
  .item-card.done { background:#F4F3EE; }
  .checkbox { margin-top:2px; flex-shrink:0; width:20px; height:20px; border-radius:6px; border:2px solid #C7C9C4; background:none; cursor:pointer; padding:0; }
  .checkbox.checked { border:2px solid #C7C9C4; background:#EDEDE6; display:flex; align-items:center; justify-content:center; color:#8A8C86; font-size:12px; font-weight:700; }
  .item-text { font-size:14px; line-height:1.6; color:#2B2E35; white-space:pre-line; flex:1; }
  .item-text.done { color:#A8A79C; text-decoration:line-through; }
  .trash-btn { background:none; border:none; cursor:pointer; color:#C7A9AA; font-size:14px; margin-top:2px; flex-shrink:0; }
  .group-label { font-size:12px; font-weight:500; color:#9A998F; margin:16px 0 8px 4px; }
  .group-label:first-child { margin-top:0; }
  .footer-hint { text-align:center; font-size:11px; color:#B7B6AB; padding-top:8px; }
  .input-bar { padding:8px 20px 12px; border-top:1px solid #EEEDE5; flex-shrink:0; }
  .input-wrap { display:flex; align-items:center; gap:8px; border-radius:999px; padding:6px 6px 6px 16px; background:#fff; border:1px solid #E7E4DC; }
  .input-wrap input { flex:1; border:none; outline:none; font-size:14px; padding:8px 0; color:#2B2E35; background:transparent; font-family:'Noto Sans KR',sans-serif; }
  .send-btn { width:36px; height:36px; border-radius:999px; border:none; display:flex; align-items:center; justify-content:center; background:#E7E4DC; color:#fff; cursor:pointer; flex-shrink:0; }
  .send-btn.active { background:#5B8C74; }
  .tabbar { display:flex; border-top:1px solid #EEEDE5; flex-shrink:0; }
  .tab-btn { flex:1; padding:12px 0; text-align:center; font-size:14px; font-weight:500; background:none; border:none; cursor:pointer; color:#B7B6AB; }
  .tab-btn.active { color:#5B8C74; }
  .badge { font-size:10px; margin-left:2px; }
  .share-card { border-radius:16px; padding:20px; background:#fff; border:1px solid #EBE9E0; text-align:center; margin-top:16px; }
  .share-icon { width:56px; height:56px; border-radius:999px; margin:0 auto 12px; background:#EEF3EC; display:flex; align-items:center; justify-content:center; font-size:22px; }
  .share-title { font-size:14px; color:#2B2E35; }
  .share-sub { font-size:12px; color:#9A998F; margin-top:4px; }
  .invite-btn { width:100%; margin-top:16px; padding:10px; border-radius:12px; border:none; background:#5B8C74; color:#fff; font-size:14px; font-weight:500; cursor:pointer; }
  .invite-link { border-radius:12px; padding:10px 12px; background:#F4F2EA; border:1px dashed #D8D5C8; display:flex; align-items:center; justify-content:space-between; margin-top:16px; }
  .invite-link span { font-size:12px; color:#5B5A52; }
  .copy-btn { background:none; border:none; cursor:pointer; color:#5B8C74; font-size:13px; margin-left:8px; }
  .copied-msg { font-size:11px; color:#5B8C74; margin-top:6px; }
  .demo-btn { width:100%; margin-top:10px; padding:8px; border-radius:12px; border:1px solid #EBE9E0; background:#F4F2EA; color:#5B5A52; font-size:12px; cursor:pointer; }
  .partner-row { display:flex; align-items:center; gap:12px; text-align:left; }
  .partner-avatar { width:44px; height:44px; border-radius:999px; background:#EEF3EC; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
  .partner-name { font-size:14px; font-weight:500; color:#2B2E35; }
  .partner-sub { font-size:11px; color:#9A998F; }
  .unshare-btn { width:100%; margin-top:16px; padding:8px; border-radius:12px; border:none; background:#F7EEEE; color:#B1585D; font-size:12px; cursor:pointer; }
</style>
</head>
<body>
<div id="app" class="app"></div>

<script>
function todayLabel(ts) {
  const d = new Date(ts), today = new Date(), yesterday = new Date();
  yesterday.setDate(today.getDate() - 1);
  const sameDay = (a, b) => a.toDateString() === b.toDateString();
  if (sameDay(d, today)) return "오늘";
  if (sameDay(d, yesterday)) return "어제";
  return `${d.getMonth() + 1}월 ${d.getDate()}일`;
}
function genCode() {
  const chars = "ABCDEFGHJKMNPQRSTUVWXY23456789";
  let s = "";
  for (let i = 0; i < 6; i++) s += chars[Math.floor(Math.random() * chars.length)];
  return s;
}
let idSeq = 100;
const STORAGE_KEY = "checknote_items_v1";

function loadItems(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      idSeq = parsed.reduce((max, i) => Math.max(max, i.id), 100) + 1;
      return parsed;
    }
  } catch(e) { console.error("불러오기 실패", e); }
  return [
    { id: 1, text: "테스트1", completedAt: null, createdAt: Date.now() - 1000*60*60*3 },
    { id: 2, text: "테스트2", completedAt: null, createdAt: Date.now() - 1000*60*60*2 },
    { id: 3, text: "테스트3-1\n테스트3-2\n테스트3-3", completedAt: null, createdAt: Date.now() - 1000*60*60 },
    { id: 4, text: "테스트4", completedAt: Date.now() - 1000*60*60*20, createdAt: Date.now() - 1000*60*60*26 },
    { id: 5, text: "테스트5", completedAt: Date.now() - 1000*60*60*30, createdAt: Date.now() - 1000*60*60*40 },
  ];
}
function saveItems(){
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); }
  catch(e) { console.error("저장 실패", e); }
}

let items = loadItems();
let tab = "list";
let partner = null;
let inviteCode = null;
let copied = false;

function setTab(t){ tab = t; render(); }
function addItem(){
  const el = document.getElementById("todo-input");
  const text = el.value.trim();
  if(!text) return;
  items.push({ id: idSeq++, text, completedAt: null, createdAt: Date.now() });
  el.value = "";
  saveItems();
  render();
  document.getElementById("todo-input").focus();
}
function complete(id){ items = items.map(i => i.id===id ? {...i, completedAt: Date.now()} : i); saveItems(); render(); }
function restore(id){ items = items.map(i => i.id===id ? {...i, completedAt: null} : i); saveItems(); render(); }
function removeDone(id){ items = items.filter(i => i.id!==id); saveItems(); render(); }
function makeInvite(){ inviteCode = genCode(); render(); }
function copyInvite(){
  const link = "checknote.app/invite/" + inviteCode;
  if(navigator.clipboard) navigator.clipboard.writeText(link).catch(()=>{});
  copied = true; render();
  setTimeout(()=>{ copied=false; render(); }, 1500);
}
function simulateAccept(){ partner = { name: "상대방" }; render(); }
function unshare(){ partner = null; inviteCode = null; render(); }

function render(){
  const activeItems = items.filter(i=>!i.completedAt).sort((a,b)=>b.createdAt-a.createdAt);
  const doneItems = items.filter(i=>i.completedAt).sort((a,b)=>b.completedAt-a.completedAt);
  const doneGroups = {};
  doneItems.forEach(i=>{ const l = todayLabel(i.completedAt); (doneGroups[l] = doneGroups[l]||[]).push(i); });

  let contentHtml = "";
  if(tab === "list"){
    contentHtml = activeItems.length===0
      ? `<div class="empty"><div class="t1">할 일이 없어요.</div><div class="t2">아래 입력창에 새 항목을 적어보세요.</div></div>`
      : activeItems.map(item => `
        <div class="item-card">
          <button class="checkbox" onclick="complete(${item.id})"></button>
          <div class="item-text">${item.text.replace(/&/g,"&amp;").replace(/</g,"&lt;")}</div>
        </div>`).join("");
  } else if(tab === "shared"){
    if(!partner){
      contentHtml = `
        <div class="share-card">
          <div class="share-icon">🤝</div>
          <div class="share-title">한 사람과만 리스트를 공유할 수 있어요</div>
          <div class="share-sub">초대 링크를 만들어서 카톡으로 보내면 끝이에요</div>
          ${!inviteCode ? `
            <button class="invite-btn" onclick="makeInvite()">🔗 초대 링크 만들기</button>
          ` : `
            <div class="invite-link">
              <span>checknote.app/invite/${inviteCode}</span>
              <button class="copy-btn" onclick="copyInvite()">복사</button>
            </div>
            ${copied ? `<div class="copied-msg">링크를 복사했어요. 카톡에 붙여넣어 보내주세요.</div>` : ""}
            <button class="demo-btn" onclick="simulateAccept()">(데모) 상대방이 링크를 열어 참여했다고 가정</button>
          `}
        </div>`;
    } else {
      contentHtml = `
        <div class="share-card" style="text-align:left;">
          <div class="partner-row">
            <div class="partner-avatar">🤝</div>
            <div>
              <div class="partner-name">${partner.name}님과 공유 중</div>
              <div class="partner-sub">서로 추가·완료한 항목이 실시간으로 보여요</div>
            </div>
          </div>
          <button class="unshare-btn" onclick="unshare()">공유 해제하기</button>
        </div>`;
    }
  } else if(tab === "done"){
    if(doneItems.length===0){
      contentHtml = `<div class="empty"><div class="t1">아직 완료한 항목이 없어요.</div></div>`;
    } else {
      contentHtml = Object.entries(doneGroups).map(([label, group]) => `
        <div class="group-label">${label}</div>
        ${group.map(item => `
          <div class="item-card done">
            <button class="checkbox checked" onclick="restore(${item.id})">✓</button>
            <div class="item-text done">${item.text.replace(/&/g,"&amp;").replace(/</g,"&lt;")}</div>
            <button class="trash-btn" onclick="removeDone(${item.id})">✕</button>
          </div>`).join("")}
      `).join("") + `<div class="footer-hint">체크를 다시 누르면 리스트로 돌아가요</div>`;
    }
  }

  const headerTitle = tab==="list" ? "체크노트" : tab==="shared" ? "공유" : "완료";
  const headerSub = tab==="list" ? `할 일 ${activeItems.length}개`
    : tab==="shared" ? (partner ? `${partner.name}님과 공유 중` : "아직 공유한 상대가 없어요")
    : `완료 ${doneItems.length}개`;

  document.getElementById("app").innerHTML = `
    <div class="header">
      <h1 class="display">${headerTitle}</h1>
      <p>${headerSub}</p>
    </div>
    <div class="content">${contentHtml}</div>
    ${tab==="list" ? `
      <div class="input-bar">
        <div class="input-wrap">
          <input id="todo-input" placeholder="새 항목" onkeydown="if(event.key==='Enter') addItem()" />
          <button class="send-btn" id="send-btn" onclick="addItem()">➤</button>
        </div>
      </div>` : ""}
    <div class="tabbar">
      <button class="tab-btn ${tab==='list'?'active':''}" onclick="setTab('list')">리스트</button>
      <button class="tab-btn ${tab==='shared'?'active':''}" onclick="setTab('shared')">공유</button>
      <button class="tab-btn ${tab==='done'?'active':''}" onclick="setTab('done')">완료${doneItems.length>0?`<span class="badge">${doneItems.length}</span>`:""}</button>
    </div>
  `;

  if(tab==="list"){
    const inputEl = document.getElementById("todo-input");
    const sendBtn = document.getElementById("send-btn");
    inputEl.addEventListener("input", () => {
      sendBtn.classList.toggle("active", inputEl.value.trim().length>0);
    });
  }
}
render();
</script>
</body>
</html>
