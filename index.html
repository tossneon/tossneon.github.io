<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>아기랑 갈 곳</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Sans+KR:wght@400;500;700&family=IBM+Plex+Mono:wght@500;600&display=swap');
  * { box-sizing:border-box; }
  body { margin:0; background:#EFE4D8; font-family:'Noto Sans KR',sans-serif; display:flex; justify-content:center; }
  .display { font-family:'Gowun Dodum', sans-serif; }
  .mono { font-family:'IBM Plex Mono', monospace; }
  .app { width:100%; max-width:420px; min-height:100vh; background:#FDF4EC; box-shadow:0 0 40px rgba(0,0,0,0.06); }
  .header { padding:32px 20px 16px; }
  .header .taghead { display:flex; align-items:center; gap:6px; }
  .header .tag { font-size:10px; letter-spacing:.2em; color:#FF7B54; margin:0; }
  .header h1 { font-size:24px; margin:4px 0 0; color:#3B2E2A; }
  .header p.sub { font-size:12px; margin:4px 0 0; color:#A8998C; }

  .addwrap { padding:0 20px; }
  .quickadd { display:flex; align-items:center; gap:8px; border-radius:999px; padding:6px 6px 6px 16px; background:#fff; border:1px solid #EDE0D2; }
  .quickadd input { flex:1; border:none; outline:none; font-size:14px; padding:8px 0; color:#3B2E2A; background:transparent; font-family:'Noto Sans KR',sans-serif; }
  .quickadd button { width:36px; height:36px; border-radius:999px; border:none; display:flex; align-items:center; justify-content:center; background:#EDE0D2; color:#fff; cursor:pointer; flex-shrink:0; font-size:16px; }
  .quickadd button.active { background:#FF7B54; }

  .draft { border-radius:16px; padding:16px; background:#fff; border:1px solid #EDE0D2; }
  .draft-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .draft-src { display:flex; align-items:center; gap:6px; font-size:11px; color:#A8998C; }
  .draft-top button { background:none; border:none; cursor:pointer; color:#A8998C; font-size:14px; }
  .draft input.name { width:100%; font-size:14px; font-weight:500; border-radius:8px; padding:8px 12px; margin-bottom:10px; border:1px solid #EDE0D2; background:#FDF9F4; color:#3B2E2A; box-sizing:border-box; }
  .draft label { font-size:11px; color:#A8998C; margin-bottom:6px; display:block; }
  .chiprow { display:flex; gap:6px; margin-bottom:12px; }
  .chip { flex:1; padding:6px; border-radius:8px; font-size:11px; font-weight:500; border:1px solid #EDE0D2; background:#FDF9F4; color:#8C8378; cursor:pointer; text-align:center; }
  .chip.active { color:#fff; border:none; }
  .draft textarea { width:100%; font-size:14px; border-radius:8px; padding:8px 12px; margin-bottom:12px; border:1px solid #EDE0D2; background:#FDF9F4; color:#3B2E2A; resize:none; box-sizing:border-box; font-family:'Noto Sans KR',sans-serif; }
  .draft .save { width:100%; padding:10px; border-radius:12px; border:none; background:#3B2E2A; color:#FDF4EC; font-size:14px; font-weight:500; cursor:pointer; }

  .filters { padding:20px 20px 0; display:flex; align-items:center; gap:6px; overflow-x:auto; }
  .fbtn { flex-shrink:0; padding:6px 12px; border-radius:999px; font-size:12px; font-weight:500; border:1px solid #EDE0D2; background:#fff; color:#8C8378; cursor:pointer; }
  .fbtn.active { background:#3B2E2A; color:#FDF4EC; }
  .favbtn { flex-shrink:0; width:32px; height:32px; border-radius:999px; display:flex; align-items:center; justify-content:center; border:1px solid #EDE0D2; background:#fff; cursor:pointer; font-size:14px; }
  .favbtn.active { background:#FFD966; }

  .list { padding:16px 20px 40px; display:flex; flex-direction:column; gap:10px; }
  .empty { text-align:center; font-size:12px; color:#C9BEAE; padding:40px 0; }
  .pcard { border-radius:16px; padding:14px 16px; background:#fff; border:1px solid #EDE0D2; }
  .pcard-top { display:flex; align-items:flex-start; justify-content:space-between; }
  .pcard-meta { display:flex; align-items:center; gap:6px; }
  .badge { font-size:10px; font-weight:600; padding:2px 8px; border-radius:999px; color:#fff; }
  .aud { font-size:10px; font-weight:500; }
  .pname { font-size:14px; font-weight:500; margin-top:6px; color:#3B2E2A; }
  .pmemo { font-size:12px; margin-top:4px; line-height:1.5; color:#A8998C; }
  .starbtn { background:none; border:none; cursor:pointer; font-size:16px; }
  .delrow { display:flex; justify-content:flex-end; margin-top:8px; }
  .delbtn { background:none; border:none; cursor:pointer; font-size:10px; color:#C9BEAE; }

  .footnote { margin:0 20px 32px; border-radius:12px; padding:14px; background:#F3E7D9; color:#8C8378; font-size:11px; line-height:1.6; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="taghead">
      <span>📍</span><p class="tag mono">PLACE REGISTRY</p>
    </div>
    <h1 class="display">아기랑 갈 곳</h1>
    <p class="sub">링크나 상호명을 붙여넣으면 바로 등록돼요</p>
  </div>

  <div class="addwrap" id="addwrap"></div>

  <div class="filters" id="filters"></div>
  <div class="list" id="list"></div>

  <div class="footnote">지금은 등록·분류·메모·즐겨찾기까지만 되는 단계예요. 실제 지도 위에 핀으로 표시하는 건 다음 단계에서 카카오맵 API로 연동할게요.</div>
</div>

<script>
const TYPES = [
  { key:"놀곳", color:"#3AAFA9" },
  { key:"먹을곳", color:"#FF7B54" },
  { key:"카페", color:"#B98B4E" },
  { key:"기타", color:"#8C8378" },
];
const AUDIENCES = [
  { key:"아기전용", icon:"👶", color:"#FF7B54" },
  { key:"전연령", icon:"👨‍👩‍👧", color:"#3AAFA9" },
  { key:"어른동반", icon:"🧑", color:"#8C8378" },
];

let idSeq = 10;
let places = [
  { id:1, raw:"https://map.kakao.com/xxxxx", source:"link", name:"몽실놀이터", type:"놀곳", audience:"전연령", memo:"실내라 비 와도 좋음, 주차 넉넉", favorite:true },
  { id:2, raw:"우리동네 국수집", source:"text", name:"우리동네 국수집", type:"먹을곳", audience:"아기전용", memo:"유아의자 있음, 이유식 데워줌", favorite:false },
  { id:3, raw:"https://place.map.naver.com/yyyyy", source:"link", name:"라운드어바웃 카페", type:"카페", audience:"어른동반", memo:"아기의자는 없고 유모차 자리 넓음", favorite:false },
];
let draft = null;
let rawInput = "";
let filterType = "전체";
let favOnly = false;

function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;"); }
function detectSource(raw){ return /^https?:\/\//i.test(raw.trim()) ? "link" : "text"; }
function guessName(raw){
  if(detectSource(raw)==="link"){
    try { const u = new URL(raw.trim()); return u.hostname.replace("www.","") + " 링크"; }
    catch { return "붙여넣은 링크"; }
  }
  return raw.trim();
}

function renderAdd(){
  const el = document.getElementById("addwrap");
  if(!draft){
    el.innerHTML = `
      <div class="quickadd">
        <input id="raw-input" placeholder="링크, 주소, 상호명 붙여넣기" value="${esc(rawInput)}" />
        <button id="start-btn">＋</button>
      </div>`;
    const input = document.getElementById("raw-input");
    input.addEventListener("input", e => { rawInput = e.target.value; document.getElementById("start-btn").classList.toggle("active", rawInput.trim().length>0); });
    input.addEventListener("keydown", e => { if(e.key==="Enter") startRegister(); });
    document.getElementById("start-btn").addEventListener("click", startRegister);
  } else {
    el.innerHTML = `
      <div class="draft">
        <div class="draft-top">
          <span class="draft-src">${draft.source==="link" ? "🔗 링크에서 등록" : "📍 직접 입력"}</span>
          <button id="cancel-btn">✕</button>
        </div>
        <input class="name" id="draft-name" value="${esc(draft.name)}" placeholder="장소 이름" />
        <label>유형</label>
        <div class="chiprow" id="type-row"></div>
        <label>대상</label>
        <div class="chiprow" id="aud-row"></div>
        <textarea id="draft-memo" rows="2" placeholder="메모 (유아의자 있는지, 주차 등)">${esc(draft.memo)}</textarea>
        <button class="save" id="save-btn">등록하기</button>
      </div>`;
    document.getElementById("draft-name").addEventListener("input", e => draft.name = e.target.value);
    document.getElementById("draft-memo").addEventListener("input", e => draft.memo = e.target.value);
    document.getElementById("cancel-btn").addEventListener("click", () => { draft = null; renderAdd(); });
    document.getElementById("save-btn").addEventListener("click", confirmRegister);

    document.getElementById("type-row").innerHTML = TYPES.map(t => `<div class="chip ${draft.type===t.key?'active':''}" data-t="${t.key}" style="${draft.type===t.key?`background:${t.color};`:''}">${t.key}</div>`).join("");
    document.querySelectorAll("#type-row .chip").forEach(chip => chip.addEventListener("click", () => { draft.type = chip.dataset.t; renderAdd(); }));

    document.getElementById("aud-row").innerHTML = AUDIENCES.map(a => `<div class="chip ${draft.audience===a.key?'active':''}" data-a="${a.key}" style="${draft.audience===a.key?`background:${a.color};`:''}">${a.icon} ${a.key}</div>`).join("");
    document.querySelectorAll("#aud-row .chip").forEach(chip => chip.addEventListener("click", () => { draft.audience = chip.dataset.a; renderAdd(); }));
  }
}

function startRegister(){
  const raw = rawInput.trim();
  if(!raw) return;
  draft = { raw, source: detectSource(raw), name: guessName(raw), type:"놀곳", audience:"전연령", memo:"" };
  rawInput = "";
  renderAdd();
}
function confirmRegister(){
  if(!draft || !draft.name.trim()) return;
  places.unshift({ id: idSeq++, favorite:false, ...draft });
  draft = null;
  renderAdd();
  renderList();
}
function toggleFav(id){ places = places.map(p => p.id===id ? {...p, favorite: !p.favorite} : p); renderList(); }
function removePlace(id){ places = places.filter(p => p.id !== id); renderList(); }

function renderFilters(){
  const el = document.getElementById("filters");
  const types = ["전체", ...TYPES.map(t=>t.key)];
  el.innerHTML = types.map(t => `<button class="fbtn ${filterType===t?'active':''}" data-t="${t}">${t}</button>`).join("")
    + `<button class="favbtn ${favOnly?'active':''}" id="fav-toggle">⭐</button>`;
  el.querySelectorAll(".fbtn").forEach(b => b.addEventListener("click", () => { filterType = b.dataset.t; renderFilters(); renderList(); }));
  document.getElementById("fav-toggle").addEventListener("click", () => { favOnly = !favOnly; renderFilters(); renderList(); });
}

function renderList(){
  const el = document.getElementById("list");
  const visible = places.filter(p => filterType==="전체" ? true : p.type===filterType).filter(p => favOnly ? p.favorite : true);
  if(visible.length===0){ el.innerHTML = `<div class="empty">등록된 장소가 없어요.</div>`; return; }
  el.innerHTML = visible.map(p => {
    const typeInfo = TYPES.find(t=>t.key===p.type);
    const audInfo = AUDIENCES.find(a=>a.key===p.audience);
    return `
      <div class="pcard">
        <div class="pcard-top">
          <div>
            <div class="pcard-meta">
              <span class="badge" style="background:${typeInfo?.color}">${p.type}</span>
              ${audInfo ? `<span class="aud" style="color:${audInfo.color}">${audInfo.icon} ${audInfo.key}</span>` : ""}
              ${p.source==="link" ? `<span style="font-size:10px;color:#C9BEAE;">🔗</span>` : ""}
            </div>
            <div class="pname">${esc(p.name)}</div>
            ${p.memo ? `<div class="pmemo">${esc(p.memo)}</div>` : ""}
          </div>
          <button class="starbtn" onclick="toggleFav(${p.id})">${p.favorite ? "⭐" : "☆"}</button>
        </div>
        <div class="delrow"><button class="delbtn" onclick="removePlace(${p.id})">삭제</button></div>
      </div>`;
  }).join("");
}

renderAdd();
renderFilters();
renderList();
</script>
</body>
</html>
